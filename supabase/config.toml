# Supabase project configuration for Unibill backend (T-103, T-201, T-203).
#
# Local development is driven by the Supabase CLI; this file is committed so that
# every contributor and CI runner gets the same local stack shape.
#
# Production overrides live in the Supabase Cloud dashboard and in the
# environment-specific `supabase link` configuration; do NOT promote anything
# secret through this file.
#
# Spec refs: §3.1 (backend stack), §3.4 (repo layout), §9.1 (auth).

# A project_id is required by the CLI; this is a local-only identifier and does
# not have to match the linked Supabase Cloud `project_ref`.
project_id = "unibill-dev"

# -------------------------------------------------------------------------
# REST/GraphQL API gateway exposed by `supabase start`. The default port is
# the Supabase canonical 54321 so that mobile/web clients can point at
# http://localhost:54321 without extra config.
# -------------------------------------------------------------------------
[api]
enabled = true
port = 54321
# Schemas exposed via PostgREST. `public` is kept for Supabase-generated
# objects; `app` is the Unibill schema (see T-105 / spec §5.11).
schemas = ["public", "app"]
# Schemas that PostgREST will use to resolve unqualified identifiers.
extra_search_path = ["public", "app", "extensions"]
# Cap rows returned by PostgREST to keep development feedback fast and to
# match the API quota that Supabase enforces on the free tier.
max_rows = 1000

# -------------------------------------------------------------------------
# Embedded Postgres for local development. Major version 15 matches Supabase
# Cloud's current default and unlocks the extensions listed in spec §3.1.
# -------------------------------------------------------------------------
[db]
port = 54322
# Shadow database used by `supabase db diff` to compute migration deltas.
shadow_port = 54320
major_version = 15

# -------------------------------------------------------------------------
# Supabase Studio (web UI) for inspecting the local stack.
# -------------------------------------------------------------------------
[studio]
enabled = true
port = 54323

# -------------------------------------------------------------------------
# Storage service — used for PDF archives and household assets.
# Keep the file-size limit aligned with the Cloud free-tier default so that
# local validation catches oversized uploads before they reach production.
# -------------------------------------------------------------------------
[storage]
enabled = true
file_size_limit = "50MiB"

# -------------------------------------------------------------------------
# Auth (GoTrue). Spec §9.1.
#
# MVP supports BOTH email+password (with mandatory confirmation) and magic
# links. The mobile app deep-links every callback back via `unibill://`.
#
# Password policy (spec §9.1):
#   - >= 10 chars (enforced server side)
#   - lower + upper + digit + special (enforced server side via
#     `password_required_characters`; client SHOULD mirror these rules in the
#     signup form for fast feedback)
#   - HIBP (HaveIBeenPwned) check ENABLED — rejects passwords known to be
#     leaked. Uses k-anonymity: only the first 5 chars of the SHA-1 hash
#     leave the GoTrue server.
#
# Sessions (spec §9.1):
#   - JWT access token: 1 hour
#   - Refresh token: 1 week (`refresh_token_reuse_interval = 0` plus
#     `refresh_token_rotation_enabled = true` forces a rotation on every
#     refresh, so a stolen refresh token is single-use)
#
# Rate limits (spec §9.1):
#   - 5 signups/hour/IP
#   - 10 password resets/hour/IP
#   - 5 OTP requests/hour/email
#
# Lockout, captcha, and invitation rate limits live OUTSIDE of GoTrue —
# they are enforced by the Edge Function middleware (`_shared/rate_limit.ts`
# / T-204 / T-205) because GoTrue does not natively support per-email
# lockout windows.
# -------------------------------------------------------------------------
[auth]
enabled = true
# `site_url` is the fallback that GoTrue substitutes when a request omits a
# `redirect_to` parameter, AND it is implicitly whitelisted. Spec §9.1
# pins this to the bare custom scheme so password-reset / magic-link / OAuth
# flows always re-enter the mobile app.
site_url = "unibill://"
# Three callback paths per spec §9.1 (T-203). Each one carries a distinct
# semantic in the mobile router (`GoRoute(path: '/auth/...')`):
#   - `auth/callback`    — generic OAuth / email-confirmation re-entry
#   - `auth/recovery`    — password-reset link (1h TTL)
#   - `auth/magic-link`  — passwordless OTP / magic link sign-in
# TODO(post-MVP, when domain exists): also add
# `https://app.unibill.dev/auth/callback` here and host
# `.well-known/assetlinks.json` so Android App Links resolve without the
# "open with" prompt.
additional_redirect_urls = [
  "unibill://auth/callback",
  "unibill://auth/recovery",
  "unibill://auth/magic-link",
]
# 1 hour access tokens; the mobile SDK refreshes silently.
jwt_expiry = 3600
# Rotate refresh tokens to limit blast radius of a stolen token (spec §9.1:
# "Session: 1 semana com refresh token rotation"). v2 config key name.
enable_refresh_token_rotation = true
# Single-use refresh tokens (no reuse window) — a stolen rotated token is dead.
refresh_token_reuse_interval = 0
# Floor for password length (spec §9.1: min 10 chars). v2 config key name.
minimum_password_length = 10
# Required character classes (spec §9.1: lower+upper+digit+special). v2 takes an
# enum (not a charset string).
password_requirements = "lower_upper_letters_digits_symbols"
# NOTE: refresh-token LIFETIME (spec §9.1: 1 week) and the HIBP/leaked-password
# check (spec §9.1) have no local supabase config keys in CLI v2 — they are
# enforced on the hosted project (Dashboard → Auth, or GOTRUE_PASSWORD_HIBP_ENABLED
# / refresh-token TTL). Documented here so the policy isn't lost. See #213.

[auth.email]
enable_signup = true
# Require confirmation when a user changes their primary email so that a
# compromised inbox alone cannot pivot to a new identity.
double_confirm_changes = true
# Mandatory email confirmation on signup (spec §9.1).
enable_confirmations = true
# Password-reset link TTL (spec §9.1: "Password reset (link 1h)"). Seconds.
otp_expiry = 3600
# Magic-link / OTP length. 6 digits matches the SDK default and the pt-BR
# templates rendered in T-202.
otp_length = 6

# Magic links are explicitly enabled as an alternative to password login
# (spec §9.1: "Magic link disponível como alternativa").
[auth.email.template.magic_link]
subject = "Seu link de acesso ao Unibill"

# -------------------------------------------------------------------------
# Per-endpoint rate limits enforced by GoTrue itself. These are the ONLY
# limits documented in spec §9.1 that map cleanly to GoTrue config; all
# other limits (login lockout, invitation redeem, hCaptcha trigger) are
# enforced in Edge Function middleware.
# -------------------------------------------------------------------------
[auth.rate_limit]
# 5 signups per hour per IP (spec §9.1).
sign_in_sign_ups = 5
# 10 password recoveries per hour per IP (spec §9.1).
token_refresh = 150
# OTP / magic-link sends: 5 per hour per email (spec §9.1).
email_sent = 5
# Password recovery emails: 10 per hour per IP (spec §9.1).
sms_sent = 0

# -------------------------------------------------------------------------
# Edge Functions runtime. `per_worker` keeps each function instance isolated,
# matching the production deployment model used by Supabase Cloud.
# -------------------------------------------------------------------------
[edge_runtime]
enabled = true
policy = "per_worker"

# -------------------------------------------------------------------------
# Per-function overrides. The system workers (pg_cron → private.invoke_edge_function
# with a service_role bearer) keep the platform's default `verify_jwt = true`
# EXPLICITLY: the API gateway rejects any request without a project-signed JWT
# before it reaches the function (layer 1), and `requireServiceRole` then narrows
# to the exact service-role secret (layer 2). Making this explicit guards against
# a future change silently turning these into unauthenticated webhooks.
# -------------------------------------------------------------------------
[functions.sync-dispatcher]
verify_jwt = true

[functions.sync-worker]
verify_jwt = true

[functions.extraction-worker]
verify_jwt = true

[functions.capacity-monitor]
verify_jwt = true

[functions.capacity-evictor]
verify_jwt = true
