name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (deno fmt + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check supabase/functions

      - name: Lint
        run: deno lint supabase/functions

  migration-lint:
    name: migration-lint (filename + structural invariants)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run migration linter (filename + structural invariants)
        run: deno run --allow-read --allow-env scripts/lint_migrations.ts

  config-drift:
    name: config-drift (app_settings docs ↔ seeds ↔ code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run config-docs sync drift check
        run: deno run --allow-read --allow-env scripts/check_config_docs_sync.ts --spec docs/superpowers/specs/2026-06-08-unibill-mvp-design.md

  test-db:
    name: test-db (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned to match local validation and the v2-format config.toml.
          # The previously pinned v1 CLI cannot start this config (v2 sections
          # like [functions.*], v2 image versions). Keep in sync with
          # .tool-versions.
          version: 2.107.0

      # `supabase db start` boots the local Postgres container and applies every
      # migration in supabase/migrations/ to a virgin DB (the canonical Supabase
      # pgTAP-CI recipe). No seed needed: the suites are hermetic (BEGIN/ROLLBACK,
      # self-fixturing).
      - name: Start local Postgres (applies all migrations)
        run: supabase db start

      # Runs pg_prove over supabase/tests/**. Exits non-zero on any failed
      # assertion or non-test file, so the job fails loudly. Validated locally:
      # Files=13, Tests=120, Result: PASS.
      - name: Run pgTAP suite
        run: supabase test db

  test-deno:
    name: test-deno (Edge Function tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache transitive npm deps (needed by jsr:@supabase/supabase-js)
        run: |
          # deno.jsonc has `"nodeModulesDir": "auto"` so this materializes
          # the transitive npm modules (e.g., @supabase/realtime-js) into ./node_modules
          # before tests run, avoiding mid-test resolution failures.
          deno install || true

      - name: Run Deno tests with coverage
        run: |
          rm -rf coverage && mkdir -p coverage
          deno test --allow-all --coverage=coverage supabase/functions/

      # Publish coverage as an artifact + a run-summary table (T-617 / §12.4).
      # Reporting only — NOT a hard gate: a global threshold on this required
      # check would block merges on any dip; reviewers use the artifact instead.
      - name: Coverage report + summary
        if: always()
        env:
          NO_COLOR: '1'
        run: |
          set -euo pipefail
          if [ -n "$(ls -A coverage 2>/dev/null)" ]; then
            deno coverage coverage --lcov --output=coverage.lcov
            {
              echo "## Deno coverage (§12.4 — reporting only)"
              echo '```'
              deno coverage coverage | tail -n 80
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "test-deno: no coverage profiles produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deno-coverage
          path: coverage.lcov
          if-no-files-found: warn
