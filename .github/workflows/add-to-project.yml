name: Add new issues to Unibill MVP project

on:
  issues:
    types: [opened, reopened, transferred]
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  add-to-project:
    name: Add to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/Lukazukimo/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
