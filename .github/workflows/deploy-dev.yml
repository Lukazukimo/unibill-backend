name: Deploy (dev)

# Runs only after the CI workflow succeeds on a push to `main`.
# Spec §11.1: push to `main` → deploy dev automático.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to dev
    runs-on: ubuntu-latest
    # Only deploy if the upstream CI run was successful (and was on main).
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    environment:
      name: dev
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_DEV }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_DEV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # TODO: wire link + push + deploy once a real Supabase project exists (deploy checklist §11.5).
      - name: Push migrations + config (placeholder)
        run: |
          echo "Would run: supabase link --project-ref \"$SUPABASE_PROJECT_REF\""
          echo "Would run: supabase db push --linked --password \"$SUPABASE_DB_PASSWORD\""
          # `db push` only ships migrations (schema). `config push` applies the
          # [auth]/[api] config from supabase/config.toml to the remote project
          # — including additional_redirect_urls (the unibill://auth/* deep-link
          # allow-list consumed by the mobile auth flows, T-515), password rules
          # and token TTLs. Without it the deep-link allow-list never reaches the
          # project and would have to be set by hand in the dashboard.
          echo "Would run: supabase config push"

      - name: Deploy Edge Functions (placeholder)
        run: |
          echo "Would run: supabase functions deploy --project-ref \"$SUPABASE_PROJECT_REF\" --all"
